# ─────────────────────────────────────────────────────────────────────────────
# UniAttackDetection – Combined Protocol 2.1 & 2.2 Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Paths ──────────────────────────────────────────────────────────────────
data_root: "/home/nayana/Data/UniAttackData"

# ── Protocol 2.1  (train: live + physical,  test: digital attacks) ─────────
p21_train_txt: "/home/nayana/Data/UniAttackData@p2.1_image_train.txt"
p21_dev_txt:   "/home/nayana/Data/UniAttackData@p2.1_image_dev.txt"
p21_test_txt:  "/home/nayana/Data/UniAttackData@p2.1_image_test.txt"

# ── Protocol 2.2  (train: live + digital,   test: physical attacks) ────────
p22_train_txt: "/home/nayana/Data/UniAttackData@p2.2_image_train.txt"
p22_dev_txt:   "/home/nayana/Data/UniAttackData@p2.2_image_dev.txt"
p22_test_txt:  "/home/nayana/Data/UniAttackData@p2.2_image_test.txt"

# ── CLIP backbone ──────────────────────────────────────────────────────────
clip_model: "ViT-B/16"

# ── TSP module ─────────────────────────────────────────────────────────────
num_student_tokens:    16
num_teacher_templates: 6

# ── UKM loss weight ────────────────────────────────────────────────────────
lambda_ufm: 1.0

# ── Training ───────────────────────────────────────────────────────────────
epochs:      30
batch_size:  128
accum_steps: 2
lr:          2.0e-4
wd:          1.0e-4
num_workers: 4
